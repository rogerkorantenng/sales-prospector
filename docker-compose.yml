services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prospector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prospector"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/prospector
      API_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api
